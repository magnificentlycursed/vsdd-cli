# vsdd-verify.yml — deployed by `vsdd init` to adopting projects at .github/workflows/vsdd-verify.yml
# Runs all methodology hooks via the Rust mirror; emits SARIF for GitHub Code Scanning.
#
# Per DESIGN-VERIFICATION § CI workflow templates + the v1 GitHub-only platform requirement.
# Auth method: API key (Plan auth structurally rejected for CI per the cross-field validation).

name: vsdd verify

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: vsdd-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # SARIF upload to Code Scanning
  pull-requests: write    # PR comment for warnings

jobs:
  verify:
    runs-on: ubuntu-22.04
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_ENABLE_TELEMETRY: 1
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_COLLECTOR_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: Authorization=Bearer ${{ secrets.OTEL_COLLECTOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install vsdd
        run: cargo install vsdd --locked
      - name: Bootstrap toolkit artifacts
        run: vsdd init --ci-mode
      - name: Run methodology hooks
        run: vsdd verify check --format sarif > vsdd-verify.sarif
      - name: Upload SARIF for code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: vsdd-verify.sarif

  bypass-marker-gate:
    runs-on: ubuntu-22.04
    if: contains(github.event.pull_request.body, 'hook-bypass')
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Check bypass-marker PR approval (label-applier ≠ PR-author)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const prAuthor = pr.data.user.login;
            const events = await github.rest.issues.listEvents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const approvalEvent = events.data.find(e =>
              e.event === 'labeled' && e.label.name === 'bypass-approved'
            );
            if (!approvalEvent) {
              core.setFailed('PR contains bypass-marker without bypass-approved label. Add label after operator-review confirms the bypass rationale.');
            } else if (approvalEvent.actor.login === prAuthor) {
              core.setFailed(`bypass-approved label was self-applied by PR author (${prAuthor}). The label-applier must differ from the PR-author — have a separate maintainer apply the label.`);
            }
