# Anonymization patterns registry.
# Deployed by `vsdd init` to adopting projects at .vsdd/registry/anonymization-patterns.yaml.
# OTel collector reads this file for redaction-processor configuration.
# Operator extends with project-specific patterns at the end of the file.
#
# Per DESIGN-OBSERVABILITY § Credential redaction at forwarding boundary
# + DESIGN-VERIFICATION § check-anonymization.sh API-key detection patterns extension.

---
schema_class: anonymization-patterns-registry
schema_version: 1.0.0
registry_version: 0.1.0
---

# === vsdd managed ===
api_key_patterns:
  - pattern: "sk-ant-api03-[A-Za-z0-9_\\-]+"
    description: Anthropic API key
    redaction: "[REDACTED-ANTHROPIC-API-KEY]"

  - pattern: "sk-[A-Za-z0-9]{32,}"
    description: OpenAI / generic sk-prefix API key
    redaction: "[REDACTED-API-KEY]"

  - pattern: "Bearer [A-Za-z0-9_\\-\\.=]+"
    description: HTTP Authorization Bearer header
    redaction: "Bearer [REDACTED-TOKEN]"

  - pattern: "ghp_[A-Za-z0-9]{36}"
    description: GitHub Personal Access Token (classic)
    redaction: "[REDACTED-GITHUB-PAT]"

  - pattern: "github_pat_[A-Za-z0-9_]+"
    description: GitHub fine-grained PAT
    redaction: "[REDACTED-GITHUB-PAT]"

env_var_assignment_patterns:
  - pattern: "[a-zA-Z_]*_?TOKEN=[A-Za-z0-9_\\-\\.=]+"
    description: env-var-assignment with credential-shaped value (TOKEN)
    redaction: "TOKEN=[REDACTED]"

  - pattern: "[a-zA-Z_]*_?KEY=[A-Za-z0-9_\\-\\.=]+"
    description: env-var-assignment KEY
    redaction: "KEY=[REDACTED]"

  - pattern: "[a-zA-Z_]*_?SECRET=[A-Za-z0-9_\\-\\.=]+"
    description: env-var-assignment SECRET
    redaction: "SECRET=[REDACTED]"

credential_attribute_names:
  # Fields that the schema validator rejects entirely from event payloads + config
  - auth_method_credential_value
  - api_key
  - bearer_token
  - secret
  - password
  - token

operator_identity_patterns:
  # Inherited from crosslink's existing check-anonymization.sh
  - pattern_kind: "$HOME-path"
    description: Operator's home directory path (leaks local username)
    redaction: "$HOME"

  - pattern_kind: "git-user-name"
    description: git config user.name
    redaction: "[REDACTED-GIT-USER-NAME]"

  - pattern_kind: "git-user-email"
    description: git config user.email
    redaction: "[REDACTED-GIT-USER-EMAIL]"

  # Added 2026-05-28 per operator-directive identity-leak remediation (the crosslink/hub
  # branch published `crosslink-agent:inhz@<machine-hostname>` SSH key comment publicly;
  # the legacy check-anonymization hook did not cover hostname patterns).
  - pattern_kind: "machine-hostname"
    description: Operator's machine hostname; macOS default of `<FirstName>s-MacBook-Pro.local` leaks first name; Linux/Windows hostnames may leak hostname-as-identifier
    pattern: '\b[A-Za-z][A-Za-z0-9-]*-MacBook(-Pro|-Air)?(\.local)?\b'
    redaction: "[REDACTED-MACHINE]"
    note: "Operator may extend per-OS hostname patterns in the operator_extensions section below; the methodology canonical pattern catches macOS Apple-default hostname form only at v1"

  - pattern_kind: "ssh-key-comment-with-host"
    description: SSH public key comment containing host info (e.g., `crosslink-agent:<id>@<host>` form crosslink generates by default)
    pattern: '\b(crosslink-agent|ssh|user|key):[A-Za-z0-9_-]+@[A-Za-z][A-Za-z0-9-]*(\.[A-Za-z]+)*\b'
    redaction: "[REDACTED-AGENT-HOST]"

  - pattern_kind: "user-path-absolute"
    description: Absolute filesystem path containing $HOME-component (catches `/Users/<username>/...` and `/home/<username>/...` forms even when $HOME env var is not exported in the hook context)
    pattern: '(/Users/|/home/)[A-Za-z][A-Za-z0-9._-]+/'
    redaction: "<user-home>/"

  - pattern_kind: "crosslink-tracker-remote-warn"
    description: "If a `WARN no tracker_remote configured` message appears in operator-facing surfaces, this is the signal that crosslink is defaulting to `origin` and auto-pushing the hub branch publicly. Operator-directive 2026-05-28: dismissing this WARN class is itself a discipline failure (the WARN was the signal of the public-push that caused the leak)."
    pattern: 'WARN no tracker_remote configured'
    redaction: ""
    note: "Pattern detection here is for operator-runbook checklists; the actual mitigation is `crosslink config set tracker_remote local-only` (or equivalent disable-push setting)"
# === End vsdd managed ===

# Operator extensions land below this marker.
operator_extensions:
  api_key_patterns: []
  env_var_assignment_patterns: []
  credential_attribute_names: []
